name: Publish AI for Polymers Dashboard

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "app.js"
      - "styles.css"
      - "404.html"
      - ".nojekyll"
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-for-polymers-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run updater tests
        run: python -m unittest discover -s tests -v

      - name: Refresh recent publications
        run: python scripts/update_updates.py --lookback-days 120 --per-author 3 --max-items 60

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
