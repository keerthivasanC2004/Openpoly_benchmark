name: Publish Polymer AI Researcher Radar

on:
  push:
    branches: [main]
    paths:
      - "professor_dashboard/**"
      - ".github/workflows/professor-dashboard-pages.yml"
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: professor-dashboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run updater tests
        run: python -m unittest discover -s professor_dashboard/tests -v

      - name: Refresh recent publications
        run: python professor_dashboard/scripts/update_updates.py --lookback-days 120 --per-author 3 --max-items 60

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: professor_dashboard

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
